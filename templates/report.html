<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Track | Report Issue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <a href="/home" class="logo">
            <span>🌱 CleanTrack</span>
        </a>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/classify">Classify</a>
            <a href="/camera">Live</a>
            <a href="/report">Report</a>
            <a href="/dashboard">Dashboard</a>
            {% if current_user.is_authenticated %}
            <div class="user-tag">👤 {{ current_user.username }}</div>
            <a href="/logout" style="color: #ef4444; font-size: 0.8rem;">Logout</a>
            {% endif %}
        </div>
    </nav>

    <div class="container animate" style="max-width: 600px;">
        <header>
            <h1 style="font-size: 2.5rem;">Report Waste 🚩</h1>
            <p>Notify the city about waste accumulation.</p>
        </header>

        <form id="reportForm" class="card-premium">
            <div class="form-group">
                <label>Location</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="location" placeholder="Street Address or Area" required>
                    <button type="button" id="get-loc-btn" class="btn btn-secondary" style="white-space: nowrap; padding: 10px 15px;">📍 GPS</button>
                </div>
            </div>

            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="report-image" accept="image/*" required style="padding-top: 12px;">
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Take a clear photo of the site.</p>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" placeholder="Briefly describe the scale of the issue" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">🚀 Submit Report</button>
        </form>
    </div>

    <script>
        const locBtn = document.getElementById('get-loc-btn');
        const locationInput = document.getElementById('location');

        locBtn.onclick = () => {
            if (navigator.geolocation) {
                locBtn.innerText = "🔍 Fetching...";
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        if (data && data.display_name) {
                            locationInput.value = data.display_name;
                        } else {
                            locationInput.value = `${lat}, ${lon}`;
                        }
                    } catch (err) {
                        locationInput.value = `${lat}, ${lon}`;
                    } finally {
                        locBtn.innerText = "📍 GPS";
                    }
                }, () => {
                    alert("Could not fetch location");
                    locBtn.innerText = "📍 GPS";
                });
            }
        };

        const reportForm = document.getElementById('reportForm');
        reportForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('location', locationInput.value);
            formData.append('description', document.getElementById('description').value);
            
            const fileInput = document.getElementById('report-image');
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            try {
                const resp = await fetch('/api/report', { method: 'POST', body: formData });
                if (resp.ok) {
                    alert("✅ Report submitted! Thank you for helping simplify city cleaning.");
                    window.location.href = "/dashboard";
                }
            } catch (err) { console.error(err); }
        };
    </script>

    <footer>
        <p>&copy; 2026 Community Service - Clean Track</p>
    </footer>

</body>
</html>
